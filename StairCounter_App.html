<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>階段カウンター</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #666;
    --border: #2a2a2a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ── SETUP SCREEN ── */
  #setup-screen {
    width: 100%;
    max-width: 420px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    gap: 1.5rem;
  }

  #setup-screen h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-align: center;
  }

  #setup-screen p {
    color: var(--muted);
    font-size: 0.85rem;
    text-align: center;
  }

  .member-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    max-height: 50dvh;
    overflow-y: auto;
  }

  .member-btn {
    width: 100%;
    padding: 1rem 1.5rem;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
  }

  .member-btn:active, .member-btn.selected {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    transform: scale(0.98);
  }

  .loading-msg {
    color: var(--muted);
    font-size: 0.9rem;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* ── MAIN SCREEN ── */
  #main-screen {
    display: none;
    width: 100%;
    max-width: 420px;
    min-height: 100dvh;
    flex-direction: column;
    padding: 1.5rem;
    gap: 1rem;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .member-name {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
  }

  .change-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.75rem;
    padding: 0.3rem 0.7rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }

  /* 日付選択 */
  .date-selector {
    display: flex;
    gap: 0.5rem;
  }

  .date-tab {
    flex: 1;
    padding: 0.75rem;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }

  .date-tab.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,255,71,0.08);
  }

  /* カウンター表示 */
  .counter-display {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }

  .count-label {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .count-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 30vw, 8rem);
    line-height: 1;
    color: var(--text);
    transition: transform 0.1s, color 0.1s;
  }

  .count-number.bump {
    transform: scale(1.08);
    color: var(--accent);
  }

  .count-unit {
    font-size: 0.9rem;
    color: var(--muted);
  }

  /* タップボタン */
  .tap-btn {
    width: 100%;
    aspect-ratio: 1;
    max-height: 240px;
    background: var(--surface);
    border: 3px solid var(--border);
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    cursor: pointer;
    transition: all 0.1s;
    position: relative;
    overflow: hidden;
    user-select: none;
  }

  .tap-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.1s;
    border-radius: inherit;
  }

  .tap-btn:active::after { opacity: 0.15; }

  .tap-btn:active {
    transform: scale(0.97);
    border-color: var(--accent);
  }

  .tap-icon {
    font-size: 3rem;
    z-index: 1;
  }

  .tap-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.15em;
    color: var(--accent);
    z-index: 1;
  }

  /* 下部ボタン */
  .bottom-actions {
    display: flex;
    gap: 0.5rem;
  }

  .undo-btn {
    flex: 1;
    padding: 1rem;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }

  .undo-btn:active { background: #2a2a2a; transform: scale(0.97); }

  .reset-btn {
    flex: 1;
    padding: 1rem;
    background: var(--surface);
    border: 2px solid #ff4444;
    border-radius: 12px;
    color: #ff4444;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }

  .reset-btn:active { background: rgba(255,68,68,0.1); transform: scale(0.97); }

  /* 送信ボタン */
  .send-btn {
    width: 100%;
    padding: 1.2rem;
    background: var(--accent);
    border: none;
    border-radius: 14px;
    color: #000;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }

  .send-btn:active { transform: scale(0.98); opacity: 0.9; }
  .send-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  /* トースト */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #1a1a1a;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.75rem 1.5rem;
    border-radius: 50px;
    font-size: 0.9rem;
    font-weight: 700;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--accent); color: var(--accent); }
  .toast.error { border-color: #ff4444; color: #ff4444; }

  /* GAS URL入力欄 */
  .gas-url-section {
    width: 100%;
  }
  .gas-url-section label {
    display: block;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }
  .gas-url-input {
    width: 100%;
    padding: 0.75rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 0.8rem;
    font-family: monospace;
    outline: none;
  }
  .gas-url-input:focus { border-color: var(--accent); }

  .confirm-btn {
    width: 100%;
    margin-top: 0.75rem;
    padding: 1rem;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: #000;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem;
    font-weight: 900;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- ── セットアップ画面 ── -->
<div id="setup-screen">
  <h1>STAIR<br>COUNTER</h1>

  <div class="gas-url-section" id="url-section">
    <label>GAS WebApp URL（初回のみ）</label>
    <input type="url" class="gas-url-input" id="gas-url-input" placeholder="https://script.google.com/macros/s/..." />
    <button class="confirm-btn" onclick="saveGasUrl()">URLを保存してメンバーを読み込む</button>
  </div>

  <div id="member-loading" class="loading-msg" style="display:none">メンバー読み込み中…</div>
  <div id="member-error" style="display:none; color:#ff4444; font-size:0.85rem; text-align:center;"></div>

  <div class="member-list" id="member-list" style="display:none"></div>
  <p id="select-hint" style="display:none">あなたの名前を選んでください</p>
</div>

<!-- ── メイン画面 ── -->
<div id="main-screen">
  <div class="top-bar">
    <span class="member-name" id="display-member"></span>
    <button class="change-btn" onclick="changeMember()">変更</button>
  </div>

  <div class="date-selector" id="date-selector"></div>

  <div class="counter-display">
    <span class="count-label">TODAY'S STAIRS</span>
    <div class="count-number" id="count-display">0</div>
    <span class="count-unit">段</span>
  </div>

  <button class="tap-btn" id="tap-btn" onclick="tap()">
    <span class="tap-icon">🦵</span>
    <span class="tap-text">TAP TO COUNT</span>
  </button>

  <div class="bottom-actions">
    <button class="undo-btn" onclick="undo()">↩ 1段戻す</button>
    <button class="reset-btn" onclick="resetCount()">🗑 リセット</button>
  </div>

  <button class="send-btn" id="send-btn" onclick="sendToSheet()">
    📤 スプシに送信
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
  const GAS_URL_KEY = "stair_gas_url";
  const MEMBER_KEY  = "stair_member";

  let gasUrl   = localStorage.getItem(GAS_URL_KEY) || "";
  let member   = localStorage.getItem(MEMBER_KEY)  || "";
  let count    = 0;
  let selectedDate = "";

  // ── 起動処理 ──
  window.onload = async () => {
    if (!gasUrl) {
      showSetup();
      return;
    }
    if (!member) {
      showSetup();
      loadMembers();
      return;
    }
    showMain();
  };

  function showSetup() {
    document.getElementById("setup-screen").style.display = "flex";
    document.getElementById("main-screen").style.display  = "none";
    if (gasUrl) {
      document.getElementById("url-section").style.display = "none";
      loadMembers();
    } else {
      document.getElementById("gas-url-input").value = gasUrl;
    }
  }

  function showMain() {
    document.getElementById("setup-screen").style.display = "none";
    document.getElementById("main-screen").style.display  = "flex";
    document.getElementById("display-member").textContent = member;
    buildDateSelector();
  }

  // ── GAS URL保存 ──
  function saveGasUrl() {
    const val = document.getElementById("gas-url-input").value.trim();
    if (!val.startsWith("https://script.google.com")) {
      showToast("GAS URLを正しく入力してください", "error"); return;
    }
    gasUrl = val;
    localStorage.setItem(GAS_URL_KEY, gasUrl);
    document.getElementById("url-section").style.display = "none";
    loadMembers();
  }

  // ── メンバー読み込み ──
  async function loadMembers() {
    const loading = document.getElementById("member-loading");
    const errorEl = document.getElementById("member-error");
    const listEl  = document.getElementById("member-list");
    const hint    = document.getElementById("select-hint");

    loading.style.display = "block";
    errorEl.style.display = "none";
    listEl.style.display  = "none";
    hint.style.display    = "none";

    try {
      const res  = await fetch(`${gasUrl}?action=getMembers`);
      const data = await res.json();
      loading.style.display = "none";

      if (!data.members || data.members.length === 0) {
        errorEl.textContent = "メンバーが見つかりませんでした。スプシのA列を確認してください。";
        errorEl.style.display = "block";
        return;
      }

      listEl.innerHTML = "";
      data.members.forEach(name => {
        const btn = document.createElement("button");
        btn.className = "member-btn";
        btn.textContent = name;
        btn.onclick = () => selectMember(name);
        listEl.appendChild(btn);
      });
      listEl.style.display = "flex";
      hint.style.display   = "block";
    } catch (e) {
      loading.style.display = "none";
      errorEl.textContent = "読み込みエラー: " + e.message;
      errorEl.style.display = "block";
    }
  }

  function selectMember(name) {
    member = name;
    localStorage.setItem(MEMBER_KEY, member);
    showMain();
  }

  function changeMember() {
    localStorage.removeItem(MEMBER_KEY);
    member = "";
    count = 0;
    showSetup();
  }

  // ── 日付セレクター ──
  function buildDateSelector() {
    const selector = document.getElementById("date-selector");
    selector.innerHTML = "";

    const now   = new Date();
    const today = formatDateLabel(now);
    const tmrw  = new Date(now); tmrw.setDate(tmrw.getDate() + 1);
    const tmrwLabel = formatDateLabel(tmrw);

    [{ label: `今日 (${today})`, val: today },
     { label: `明日 (${tmrwLabel})`, val: tmrwLabel }].forEach((d, i) => {
      const btn = document.createElement("button");
      btn.className = "date-tab" + (i === 0 ? " active" : "");
      btn.textContent = d.label;
      btn.onclick = () => {
        document.querySelectorAll(".date-tab").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        selectedDate = d.val;
        count = 0;
        updateDisplay();
      };
      selector.appendChild(btn);
    });

    selectedDate = today;
  }

  function formatDateLabel(date) {
    return (date.getMonth() + 1) + "/" + date.getDate();
  }

  // ── カウンター操作 ──
  function tap() {
    count++;
    updateDisplay();
    const el = document.getElementById("count-display");
    el.classList.add("bump");
    setTimeout(() => el.classList.remove("bump"), 120);

    // 触覚フィードバック（対応端末のみ）
    if (navigator.vibrate) navigator.vibrate(30);
  }

  function undo() {
    if (count > 0) { count--; updateDisplay(); }
  }

  function resetCount() {
    if (!confirm(`${count}段をリセットしますか？`)) return;
    count = 0;
    updateDisplay();
  }

  function updateDisplay() {
    document.getElementById("count-display").textContent = count;
  }

  // ── スプシ送信 ──
  async function sendToSheet() {
    if (count === 0) { showToast("カウントが0です", "error"); return; }

    const btn = document.getElementById("send-btn");
    btn.disabled = true;
    btn.textContent = "送信中…";

    try {
      const res = await fetch(gasUrl, {
        method: "POST",
        body: JSON.stringify({ member, date: selectedDate, count }),
      });
      const data = await res.json();

      if (data.success) {
        showToast(`✅ ${member} / ${selectedDate} / ${count}段 を送信しました！`, "success");
      } else {
        showToast("❌ " + (data.error || "送信失敗"), "error");
      }
    } catch (e) {
      showToast("❌ 通信エラー: " + e.message, "error");
    } finally {
      btn.disabled = false;
      btn.textContent = "📤 スプシに送信";
    }
  }

  // ── トースト ──
  function showToast(msg, type = "") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "toast " + type;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 3500);
  }
</script>
</body>
</html>
