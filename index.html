<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>階段カウンター</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap');
  :root { --bg:#f5f0e8; --ink:#1a1a1a; --accent:#d4380d; --muted:#999; --border:#ddd; --surface:rgba(255,255,255,0.7); }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100dvh; overflow:hidden; background:var(--bg); color:var(--ink); font-family:'Zen Kaku Gothic New',sans-serif; }
  #member-screen { width:100%; height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem; gap:1.2rem; background:var(--bg); }
  #member-screen h1 { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; letter-spacing:.15em; color:var(--accent); }
  #member-screen p { font-size:.8rem; color:var(--muted); }
  .member-list { width:100%; max-width:360px; display:flex; flex-direction:column; gap:.5rem; max-height:65dvh; overflow-y:auto; }
  .member-btn { width:100%; padding:.9rem 1.2rem; background:white; border:1.5px solid var(--border); border-radius:10px; color:var(--ink); font-family:'Zen Kaku Gothic New',sans-serif; font-size:.95rem; font-weight:700; cursor:pointer; text-align:left; transition:all .12s; }
  .member-btn:active { background:var(--accent); color:white; border-color:var(--accent); transform:scale(.98); }
  .loading-msg { color:var(--muted); font-size:.85rem; animation:pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
  #main-screen { display:none; width:100%; height:100dvh; flex-direction:column; position:relative; overflow:hidden; }
  .top-bar { display:flex; align-items:center; justify-content:space-between; padding:.75rem 1rem; background:var(--surface); backdrop-filter:blur(8px); border-bottom:1px solid var(--border); z-index:10; flex-shrink:0; }
  .member-tag { font-size:.8rem; font-weight:700; color:var(--accent); letter-spacing:.05em; }
  .date-tabs { display:flex; gap:.3rem; }
  .date-tab { padding:.3rem .7rem; background:none; border:1.5px solid var(--border); border-radius:20px; font-family:'Zen Kaku Gothic New',sans-serif; font-size:.75rem; font-weight:700; color:var(--muted); cursor:pointer; transition:all .12s; }
  .date-tab.active { background:var(--ink); border-color:var(--ink); color:white; }
  .change-btn { background:none; border:1px solid var(--border); border-radius:6px; padding:.25rem .6rem; font-size:.7rem; color:var(--muted); font-family:'Zen Kaku Gothic New',sans-serif; cursor:pointer; }
  #tap-area { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; user-select:none; position:relative; background:var(--bg); -webkit-user-select:none; }
  #tap-area::before { content:''; position:absolute; inset:0; background:var(--accent); opacity:0; transition:opacity .08s; }
  #tap-area.pressed::before { opacity:.06; }
  .count-number { font-family:'Bebas Neue',sans-serif; font-size:clamp(6rem,40vw,12rem); line-height:1; color:var(--ink); transition:transform .08s,color .08s; z-index:1; pointer-events:none; }
  .count-number.bump { transform:scale(1.06); color:var(--accent); }
  .count-unit { font-size:1rem; color:var(--muted); letter-spacing:.1em; z-index:1; pointer-events:none; margin-top:-.5rem; }
  .tap-hint { position:absolute; bottom:1rem; font-size:.7rem; color:var(--muted); letter-spacing:.1em; pointer-events:none; }
  .bottom-bar { display:flex; gap:0; border-top:1px solid var(--border); flex-shrink:0; background:var(--surface); backdrop-filter:blur(8px); }
  .action-btn { flex:1; padding:1rem 0; background:none; border:none; border-right:1px solid var(--border); font-family:'Zen Kaku Gothic New',sans-serif; font-size:.8rem; font-weight:700; color:var(--ink); cursor:pointer; transition:background .1s; }
  .action-btn:last-child { border-right:none; }
  .action-btn:active { background:rgba(0,0,0,.05); }
  .action-btn.danger { color:var(--accent); }
  .action-btn.primary { background:var(--ink); color:white; }
  .action-btn.primary:active { background:#333; }
  .action-btn:disabled { opacity:.35; cursor:not-allowed; }
  .toast { position:fixed; bottom:5rem; left:50%; transform:translateX(-50%) translateY(80px); background:var(--ink); color:white; padding:.65rem 1.4rem; border-radius:50px; font-size:.85rem; font-weight:700; transition:transform .28s cubic-bezier(.34,1.56,.64,1); z-index:100; white-space:nowrap; pointer-events:none; }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .toast.success { background:#1a7a3a; }
  .toast.error { background:var(--accent); }
  #member-error { color:var(--accent); font-size:.8rem; text-align:center; max-width:300px; }
</style>
</head>
<body>
<div id="member-screen">
  <h1>STAIR COUNTER</h1>
  <div id="member-loading" class="loading-msg">メンバー読み込み中…</div>
  <div id="member-error" style="display:none"></div>
  <div class="member-list" id="member-list" style="display:none"></div>
  <p id="select-hint" style="display:none">名前を選んでください</p>
</div>
<div id="main-screen">
  <div class="top-bar">
    <span class="member-tag" id="display-member"></span>
    <div class="date-tabs" id="date-tabs"></div>
    <button class="change-btn" onclick="changeMember()">変更</button>
  </div>
  <div id="tap-area" ontouchstart="handleTouchStart()" ontouchend="handleTouchEnd()" onclick="tap()">
    <div class="count-number" id="count-display">0</div>
    <div class="count-unit">段</div>
    <span class="tap-hint">TAP TO COUNT</span>
  </div>
  <div class="bottom-bar">
    <button class="action-btn" onclick="undo()">↩ 1段戻す</button>
    <button class="action-btn danger" onclick="resetCount()">リセット</button>
    <button class="action-btn primary" id="send-btn" onclick="sendToSheet()">送信</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzYlLvVah85i1Na0k_dAaJsdJSck04IxgebomKMRmNdKXPKujhYUhbqIQrCn_hX1H4K/exec";
  const MEMBER_KEY = "stair_member", COUNT_KEY = "stair_count", DATE_KEY = "stair_date";
  let member = localStorage.getItem(MEMBER_KEY) || "";
  let count = parseInt(localStorage.getItem(COUNT_KEY) || "0");
  let selectedDate = "";
  window.onload = async () => { member ? showMain() : await loadMembers(); };
  async function loadMembers() {
    const loading=document.getElementById("member-loading"), errorEl=document.getElementById("member-error"), listEl=document.getElementById("member-list"), hint=document.getElementById("select-hint");
    try {
      const res=await fetch(GAS_URL+"?action=getMembers"), data=await res.json();
      loading.style.display="none";
      if(!data.members||data.members.length===0){errorEl.textContent="メンバーが見つかりません";errorEl.style.display="block";return;}
      if(data.members.length===1){selectMember(data.members[0]);return;}
      listEl.innerHTML="";
      data.members.forEach(name=>{const btn=document.createElement("button");btn.className="member-btn";btn.textContent=name;btn.onclick=()=>selectMember(name);listEl.appendChild(btn);});
      listEl.style.display="flex"; hint.style.display="block";
    } catch(e){loading.style.display="none";errorEl.textContent="読み込みエラー: "+e.message;errorEl.style.display="block";}
  }
  function selectMember(name){member=name;localStorage.setItem(MEMBER_KEY,member);showMain();}
  function changeMember(){localStorage.removeItem(MEMBER_KEY);member="";document.getElementById("member-screen").style.display="flex";document.getElementById("main-screen").style.display="none";document.getElementById("member-loading").style.display="block";document.getElementById("member-list").style.display="none";document.getElementById("member-error").style.display="none";document.getElementById("select-hint").style.display="none";loadMembers();}
  function showMain(){document.getElementById("member-screen").style.display="none";document.getElementById("main-screen").style.display="flex";document.getElementById("display-member").textContent=member;buildDateTabs();updateDisplay();}
  function buildDateTabs(){const tabs=document.getElementById("date-tabs");tabs.innerHTML="";const now=new Date(),today=fmt(now),tmrw=new Date(now);tmrw.setDate(tmrw.getDate()+1);const tmrwFmt=fmt(tmrw),saved=localStorage.getItem(DATE_KEY)||today;selectedDate=(saved===today||saved===tmrwFmt)?saved:today;[{label:"今日 "+today,val:today},{label:"明日 "+tmrwFmt,val:tmrwFmt}].forEach(d=>{const btn=document.createElement("button");btn.className="date-tab"+(selectedDate===d.val?" active":"");btn.textContent=d.label;btn.onclick=(e)=>{e.stopPropagation();document.querySelectorAll(".date-tab").forEach(b=>b.classList.remove("active"));btn.classList.add("active");selectedDate=d.val;localStorage.setItem(DATE_KEY,selectedDate);};tabs.appendChild(btn);});localStorage.setItem(DATE_KEY,selectedDate);}
  function fmt(date){return(date.getMonth()+1)+"/"+date.getDate();}
  let isTouching=false;
  function handleTouchStart(){isTouching=true;document.getElementById("tap-area").classList.add("pressed");}
  function handleTouchEnd(){document.getElementById("tap-area").classList.remove("pressed");if(isTouching){tap();isTouching=false;}}
  function tap(){if(isTouching)return;count++;saveCount();updateDisplay();const el=document.getElementById("count-display");el.classList.add("bump");setTimeout(()=>el.classList.remove("bump"),100);if(navigator.vibrate)navigator.vibrate(25);}
  function undo(){if(count>0){count--;saveCount();updateDisplay();}}
  function resetCount(){if(count===0)return;if(!confirm(count+"段をリセットしますか？"))return;count=0;saveCount();updateDisplay();}
  function saveCount(){localStorage.setItem(COUNT_KEY,count);}
  function updateDisplay(){document.getElementById("count-display").textContent=count;}
  async function sendToSheet(){if(count===0){showToast("カウントが0です","error");return;}const btn=document.getElementById("send-btn");btn.disabled=true;btn.textContent="送信中…";try{const res=await fetch(GAS_URL,{method:"POST",body:JSON.stringify({member,date:selectedDate,count})});const data=await res.json();if(data.success){showToast("✅ "+selectedDate+" / "+count+"段 送信完了！","success");}else{showToast("❌ "+(data.error||"送信失敗"),"error");}}catch(e){showToast("❌ 通信エラー","error");}finally{btn.disabled=false;btn.textContent="送信";}}
  function showToast(msg,type=""){const t=document.getElementById("toast");t.textContent=msg;t.className="toast "+type;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3000);}
</script>
</body>
</html>
